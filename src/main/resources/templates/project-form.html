<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>CreatorBoard - 新規プロジェクト</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <div class="form-wrapper">
        <div class="detail-header">
            <h2>新規プロジェクト作成</h2>
            <a th:href="@{/dashboard}" class="btn-link">← ダッシュボードへ</a>
        </div>

        <form th:action="@{/projects/new}" th:object="${project}" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label>Abletonファイル (.als) — 任意</label>
                <input type="file" name="alsFile" accept=".als">
            </div>
            <div class="form-group">
                <label>プロジェクト名</label>
                <input type="text" th:field="*{title}" placeholder="例: Summer Demo 2025">
                <span class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
            </div>
            <div class="form-group">
                <label>BPM</label>
                <input type="number" th:field="*{bpm}" placeholder="例: 128" min="1" max="1000">
            </div>
            <div class="form-group">
                <label>ジャンル</label>
                <select th:field="*{genre}">
                    <option value="">-- 選択しない --</option>
                    <option value="House">House</option>
                    <option value="Lo-fi">Lo-fi</option>
                    <option value="Techno">Techno</option>
                    <option value="Pop">Pop</option>
                    <option value="Hip-hop">Hip-hop</option>
                    <option value="Drum'n'Bass">Drum'n'Bass</option>
                    <option value="Ambient">Ambient</option>
                    <option value="Jazz">Jazz</option>
                </select>
            </div>
            <div class="form-group">
                <label>ステータス</label>
                <select th:field="*{status}">
                    <option value="未着手">未着手</option>
                    <option value="進行中">進行中</option>
                    <option value="完了">完了</option>
                </select>
            </div>
            <div class="form-group">
                <label>作業フェーズ</label>
                <select th:field="*{phase}">
                    <option value="">-- 選択しない --</option>
                    <option value="作曲中">作曲中</option>
                    <option value="編曲中">編曲中</option>
                    <option value="レコーディング中">レコーディング中</option>
                    <option value="ミキシング中">ミキシング中</option>
                    <option value="マスタリング中">マスタリング中</option>
                    <option value="リリース準備中">リリース準備中</option>
                </select>
            </div>
            <div class="form-group">
                <label>締め切り日</label>
                <input type="date" th:field="*{deadline}">
            </div>
            <div class="form-group">
                <label>メモ</label>
                <textarea th:field="*{memo}" rows="4" placeholder="制作メモを自由に記入してください"></textarea>
            </div>
            <div class="form-group">
                <label>制作日誌（任意）</label>
                <input type="date" name="initialLogDate"
                    th:value="${#temporals.format(#temporals.createToday(), 'yyyy-MM-dd')}" style="padding:8px 12px; background:var(--bg-mid); border:1px solid var(--border-color);
                           border-radius:6px; color:var(--text-main); font-family:var(--font-mono); font-size:13px;
                           margin-bottom:8px; display:block; width:100%;">
                <textarea name="initialLog" rows="3" placeholder="今日の作業内容を記録..." style="padding:8px 12px; background:var(--bg-mid); border:1px solid var(--border-color);
                           border-radius:6px; color:var(--text-main); font-family:var(--font-mono); font-size:13px;
                           resize:vertical; width:100%;"></textarea>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn-main">作成する</button>
                <a th:href="@{/dashboard}" class="btn-cancel">キャンセル</a>
            </div>
        </form>
    </div>
    <script th:src="@{/js/script.js}"></script>
</body>

</html>
