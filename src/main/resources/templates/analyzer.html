<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>CreatorBoard - Ableton Analyzer</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <div class="dashboard-wrapper">
        <header>
            <h1>Ableton Analyzer</h1>
            <div class="user-info">
                <a th:href="@{/dashboard}" class="btn-link">← ダッシュボードへ</a>
            </div>
        </header>

        <main>
            <!-- アップロードフォーム -->
            <div class="analyzer-upload-section">
                <form th:action="@{/analyzer/upload}" method="post" enctype="multipart/form-data" class="upload-form">

                    <div class="upload-zone" id="uploadZone">
                        <div class="upload-icon-large">↑</div>
                        <p class="upload-text">.als ファイルをドロップ、または</p>
                        <label class="btn-upload" for="fileInput">
                            ファイルを選択
                        </label>
                        <input type="file" id="fileInput" name="file" accept=".als" style="display:none;"
                            onchange="showFileName(this)">
                        <p class="file-name" id="fileName">ファイルが選択されていません</p>
                    </div>

                    <div style="text-align:center; margin-top: 16px;">
                        <button type="submit" class="btn-main" style="width:200px;">解析する</button>
                    </div>
                </form>

                <!-- エラー表示 -->
                <div th:if="${error}" class="analyzer-error">
                    <span th:text="${error}"></span>
                </div>
            </div>

            <!-- 解析履歴一覧＋比較フォーム -->
            <div class="analyzer-upload-section" style="margin-top: 30px;">
                <h3 style="font-size:11px; color:var(--text-muted); font-family:var(--font-mono);">解析履歴</h3>

                <form th:action="@{/analyzer/compare}" method="post">
                    <div class="analysis-list">
                        <div th:each="a : ${histories}" class="analysis-row">
                            <input type="checkbox" name="compareIds" th:value="${a.id}">
                            <span class="analysis-filename" th:text="${a.fileName}">file.als</span>
                            <span class="analysis-bpm" th:text="'BPM ' + ${a.bpm}">BPM 128</span>
                            <span class="analysis-date"
                                th:text="${#temporals.format(a.analyzedAt, 'MM/dd HH:mm')}"></span>
                        </div>
                    </div>
                    <div style="text-align:center; margin-top:12px;">
                        <button type="submit" class="btn-main" style="width:200px;">比較する</button>
                    </div>
                </form>
            </div>


            <!-- 保存済み解析結果の表示 -->
            <div th:if="${selectedAnalysis}" class="analyzer-result">
                <h2 th:text="'解析結果 — ' + ${selectedAnalysis.fileName}">解析結果</h2>

                <div class="analyzer-summary">
                    <div class="summary-card">
                        <div class="summary-label">BPM</div>
                        <div class="summary-value accent" th:text="${selectedAnalysis.bpm}">128</div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-label">トラック数</div>
                        <div class="summary-value" th:text="${selectedAnalysis.trackCount}">14</div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-label">解析日時</div>
                        <div class="summary-value" style="font-size:1rem;"
                            th:text="${#temporals.format(selectedAnalysis.analyzedAt, 'yyyy/MM/dd HH:mm')}">
                        </div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-label">MIDIトラック</div>
                        <div class="summary-value" th:text="${midi}">-</div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-label">オーディオトラック</div>
                        <div class="summary-value" th:text="${audio}">-</div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-label">リターントラック</div>
                        <div class="summary-value" th:text="${returnTrackCount}">-</div>
                    </div>
                </div>

                <!-- 使用デバイス一覧 -->
                <h3>使用デバイス</h3>
                <div class="analyzer-tracks">
                    <div class="track-devices" style="padding:10px 0;">
                        <span th:each="device : ${selectedDevices}" class="device-badge"
                            th:text="${device}">Wavetable</span>
                        <span th:if="${#lists.isEmpty(selectedDevices)}" class="no-device">デバイス情報なし</span>
                    </div>
                </div>

                <!-- BPMをプロジェクトに反映 -->
                <div class="bpm-apply-section">
                    <h3>BPM をプロジェクトに反映</h3>
                    <form th:action="@{/analyzer/apply-bpm}" method="post" class="bpm-apply-form">
                        <input type="hidden" name="bpm" th:value="${selectedAnalysis.bpm}">
                        <select name="projectId" class="phase-select" style="width:auto; min-width:200px;">
                            <option value="">-- プロジェクトを選択 --</option>
                            <option th:each="project : ${projects}" th:value="${project.id}"
                                th:text="${project.title} + ' (現在BPM: ' + (${project.bpm != null} ? ${project.bpm} : '未設定') + ')'">
                            </option>
                        </select>
                        <button type="submit" class="btn-main" style="margin-left:10px;">
                            反映する
                        </button>
                    </form>
                </div>
            </div>


            <!-- 解析結果 -->
            <div th:if="${bpm}" class="analyzer-result">

                <h2>解析結果</h2>

                <!-- サマリーカード -->
                <div class="analyzer-summary">
                    <div class="summary-card">
                        <div class="summary-label">ファイル名</div>
                        <div class="summary-value" th:text="${projectName}">-</div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-label">BPM</div>
                        <div class="summary-value accent" th:text="${bpm}">-</div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-label">トラック数</div>
                        <div class="summary-value" th:text="${tracks.size()}">-</div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-label">MIDIトラック</div>
                        <div class="summary-value" th:text="${midi}">-</div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-label">オーディオトラック</div>
                        <div class="summary-value" th:text="${audio}">-</div>
                    </div>
                    <div class="summary-card">
                        <div class="summary-label">リターントラック</div>
                        <div class="summary-value" th:text="${returnTrackCount}">-</div>
                    </div>
                </div>

                <!-- トラック一覧 -->
                <div class="analyzer-tracks">
                    <h3>トラック一覧</h3>
                    <div th:each="track : ${tracks}" class="track-row">
                        <div class="track-name" th:text="${track.name}">トラック名</div>
                        <div class="track-devices">
                            <span th:each="device : ${track.devices}" class="device-badge" th:text="${device}">
                            </span>
                            <span th:if="${#lists.isEmpty(track.devices)}" class="no-device">デバイスなし</span>
                        </div>
                    </div>
                </div>

                <div class="bpm-apply-section">
                    <h3>BPM をプロジェクトに反映</h3>
                    <form th:action="@{/analyzer/apply-bpm}" method="post" class="bpm-apply-form">
                        <input type="hidden" name="bpm" th:value="${bpm}">
                        <select name="projectId" class="phase-select" style="width:auto; min-width:200px;">
                            <option value="">-- プロジェクトを選択 --</option>
                            <option th:each="project : ${projects}" th:value="${project.id}"
                                th:text="${project.title} + ' (現在BPM: ' + (${project.bpm != null} ? ${project.bpm} : '未設定') + ')'">
                            </option>
                        </select>
                        <button type="submit" class="btn-main" style="margin-left:10px;">
                            反映する
                        </button>
                    </form>
                </div>

            </div>
        </main>
    </div>
    <script th:src="@{/js/script.js}"></script>
</body>

</html>
