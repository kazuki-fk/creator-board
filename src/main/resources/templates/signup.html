<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>CreatorBoard - 新規登録</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body class="login-body">
    <div class="login-wrapper">
        <div class="login-hero">
            <div class="login-hero-content">
                <div class="login-logo">CreatorBoard</div>
                <h1 class="login-headline">
                    あなたの制作を、<br>次のレベルへ。
                </h1>
                <p class="login-sub">
                    楽曲制作のすべてを、一つの場所で。<br>
                    プロジェクト管理から Ableton 解析まで。
                </p>
                <div class="login-features">
                    <div class="feature-item">
                        <span class="feature-dot"></span>
                        プロジェクトのカンバン管理
                    </div>
                    <div class="feature-item">
                        <span class="feature-dot"></span>
                        .als ファイルの自動解析
                    </div>
                    <div class="feature-item">
                        <span class="feature-dot"></span>
                        制作傾向のビジュアライズ
                    </div>
                </div>
            </div>
            <div class="grid-overlay"></div>
            <canvas id="waveCanvas" class="wave-canvas"></canvas>
        </div>

        <div class="login-form-area">
            <div class="login-form-box">
                <h2>新規登録</h2>

                <div th:if="${error}" class="login-error">
                    <span th:text="${error}"></span>
                </div>

                <form th:action="@{/signup}" th:object="${user}" method="post">

                    <div class="login-form-group">
                        <label>ユーザー名</label>
                        <input type="text" th:field="*{username}" placeholder="3〜20文字">
                        <span class="field-error" th:if="${#fields.hasErrors('username')}"
                            th:errors="*{username}"></span>
                    </div>

                    <div class="login-form-group">
                        <label>メールアドレス</label>
                        <input type="email" th:field="*{email}" placeholder="you@example.com">
                        <span class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
                    </div>

                    <div class="login-form-group">
                        <label>パスワード</label>
                        <input type="password" th:field="*{password}" placeholder="8文字以上">
                        <span class="field-error" th:if="${#fields.hasErrors('password')}"
                            th:errors="*{password}"></span>
                    </div>

                    <button type="submit" class="login-btn">
                        アカウントを作成
                    </button>
                </form>

                <div class="login-signup-link">
                    すでにアカウントをお持ちの方は
                    <a th:href="@{/login}">ログイン</a>
                </div>

                <div class="login-signup-link" style="margin-top: 12px;">
                    <a th:href="@{/profile}">← プロフィールに戻る</a>
                </div>
            </div>
        </div>
    </div>
    <script th:src="@{/js/script.js}"></script>
</body>

</html>
